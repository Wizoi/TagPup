[paths]
exiftool = %USERPROFILE%\AppData\Local\Programs\ExifTool\exiftool.exe
data_dir = data
embedding_cache_dir = data/embedding_cache

[model]
name = ViT-H-14
pretrained = laion2b_s32b_b79k
preserve_full_frame = true
max_aspect_ratio = 1.4
force_image_size = 512

[candidates]
tags = Landscape, Portrait, Nature, Urban, Sunset, Sunrise, Night, Ocean, Mountain, Forest, Animal, Cat, Dog, Food, Indoor, Outdoor, Vehicle, Flower, Architecture, Party, Wedding, Beach, Sports, Concert

[faces]
# Min face size in pixels. Increase to 30 or 40 to filter out tiny background noise faces.
min_face_size = 20
# MTCNN overall face confidence threshold. Increase to 0.90 or 0.95 to filter out non-faces.
confidence_threshold = 0.85
# Internal MTCNN stage thresholds (P-Net, R-Net, O-Net). Tighter values (e.g., 0.7, 0.8, 0.8) reject non-faces earlier.
mtcnn_thresholds = 0.6, 0.7, 0.7
